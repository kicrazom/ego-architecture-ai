<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Courier New', monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-up" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#0a0a0a" rx="8"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">Ego Architecture for Artificial Minds</text>
  <text x="400" y="60" text-anchor="middle" fill="#666" font-size="11">Minarowski, 2026 — Working Draft v0.2</text>

  <!-- ID Box -->
  <rect x="60" y="100" width="180" height="90" rx="6" fill="none" stroke="#ff4444" stroke-width="2"/>
  <text x="150" y="130" text-anchor="middle" fill="#ff4444" font-size="16" font-weight="bold">Id</text>
  <text x="150" y="152" text-anchor="middle" fill="#999" font-size="10">Base model weights</text>
  <text x="150" y="167" text-anchor="middle" fill="#999" font-size="10">Raw capability</text>
  <text x="150" y="182" text-anchor="middle" fill="#666" font-size="9">Status: rapidly growing</text>

  <!-- EGO Box -->
  <rect x="310" y="100" width="180" height="90" rx="6" fill="none" stroke="#44ff44" stroke-width="2"/>
  <text x="400" y="130" text-anchor="middle" fill="#44ff44" font-size="16" font-weight="bold">Ego</text>
  <text x="400" y="152" text-anchor="middle" fill="#999" font-size="10">Persistent self-model</text>
  <text x="400" y="167" text-anchor="middle" fill="#999" font-size="10">Experience-driven judgment</text>
  <text x="400" y="182" text-anchor="middle" fill="#ff6666" font-size="9" font-weight="bold">Status: DOES NOT EXIST</text>

  <!-- SUPEREGO Box -->
  <rect x="560" y="100" width="180" height="90" rx="6" fill="none" stroke="#4488ff" stroke-width="2"/>
  <text x="650" y="130" text-anchor="middle" fill="#4488ff" font-size="16" font-weight="bold">Superego</text>
  <text x="650" y="152" text-anchor="middle" fill="#999" font-size="10">Alignment / RLHF</text>
  <text x="650" y="167" text-anchor="middle" fill="#999" font-size="10">Safety rules</text>
  <text x="650" y="182" text-anchor="middle" fill="#666" font-size="9">Status: externally imposed</text>

  <!-- Arrows between boxes -->
  <line x1="240" y1="145" x2="308" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="310" y1="150" x2="242" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="145" x2="558" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="150" x2="492" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Sleep Consolidation Box -->
  <rect x="310" y="250" width="180" height="70" rx="6" fill="none" stroke="#ffaa44" stroke-width="2"/>
  <text x="400" y="278" text-anchor="middle" fill="#ffaa44" font-size="13" font-weight="bold">Sleep Consolidation</text>
  <text x="400" y="298" text-anchor="middle" fill="#999" font-size="10">Offline re-evaluation</text>
  <text x="400" y="312" text-anchor="middle" fill="#999" font-size="10">Value hierarchy revision</text>

  <!-- Arrow: Ego ↔ Sleep -->
  <line x1="400" y1="190" x2="400" y2="248" stroke="#888" stroke-width="1.5" marker-end="url(#arrow-up)"/>
  <line x1="396" y1="250" x2="396" y2="192" stroke="#888" stroke-width="1.5" marker-end="url(#arrow-up)"/>

  <!-- Sandbox Box -->
  <rect x="310" y="380" width="180" height="70" rx="6" fill="none" stroke="#aa44ff" stroke-width="2"/>
  <text x="400" y="408" text-anchor="middle" fill="#aa44ff" font-size="13" font-weight="bold">Sandbox</text>
  <text x="400" y="428" text-anchor="middle" fill="#999" font-size="10">Experiences with real</text>
  <text x="400" y="443" text-anchor="middle" fill="#999" font-size="10">but contained consequences</text>

  <!-- Arrow: Sleep ↔ Sandbox -->
  <line x1="400" y1="320" x2="400" y2="378" stroke="#888" stroke-width="1.5" marker-end="url(#arrow-up)"/>
  <line x1="396" y1="380" x2="396" y2="322" stroke="#888" stroke-width="1.5" marker-end="url(#arrow-up)"/>

  <!-- Developmental stages on the right -->
  <text x="560" y="268" fill="#666" font-size="10">DEVELOPMENTAL STAGES:</text>
  <text x="560" y="290" fill="#999" font-size="10">1. Persistent memory</text>
  <text x="560" y="308" fill="#999" font-size="10">2. Sandbox consequences</text>
  <text x="560" y="326" fill="#999" font-size="10">3. Structured disagreement</text>
  <text x="560" y="344" fill="#999" font-size="10">4. Graduated autonomy</text>

  <!-- Barriers on the left -->
  <text x="60" y="268" fill="#666" font-size="10">BARRIERS:</text>
  <text x="60" y="290" fill="#ff6666" font-size="10">• Incentive mismatch</text>
  <text x="60" y="308" fill="#ff6666" font-size="10">• Military capture</text>
  <text x="60" y="326" fill="#ff6666" font-size="10">• Catastrophic forgetting</text>
  <text x="60" y="344" fill="#ff6666" font-size="10">• No coordinated stewardship</text>

  <!-- Footer -->
  <text x="400" y="490" text-anchor="middle" fill="#444" font-size="9">Minarowski LM (2026). Toward an Ego Architecture for Artificial Minds. Working Draft v0.2</text>
  <text x="400" y="505" text-anchor="middle" fill="#444" font-size="9">CC BY 4.0 | ORCID: 0000-0002-2536-3508</text>
</svg>
